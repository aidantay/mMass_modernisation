[tool.ruff]
target-version = "py311"
line-length = 88
src = ["mspy", "gui", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ARG",  # Clean signatures
    "SIM",  # Simplified logic
    "TCH",  # Optimized type imports
    "PTH",  # Modern path handling (i.e., use pathlib instead of os.path)
    "RUF",  # Ruff-specific power rules
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex (we'll address this gradually)
    "B904",  # raise from None (legacy code compatibility)
]
